---
services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8081:80" # Map Pi-hole's web interface to host port 8081
    environment:
      - TZ=Europe/London
      - FTLCONF_webserver_api_password=${WEBSERVER_API_PASSWORD}
      - PIHOLE_DNS_=8.8.8.8;8.8.4.4
      - DNSMASQ_LISTENING=all
      - WEBTHEME=default-dark
      - FTLCONF_MISC_ETC_DNSMASQ_D=true
      - PUID=1000 # <--- Ensure this is 1000
      - PGID=1000 # <--- Ensure this is 1000
      # - FTLCONF_LOCAL_IPV4=192.168.1.53 #Depricated
    env_file:
      - .env
    volumes:
      - pihole_data:/etc/pihole
      - ./dnsmasq.d-custom/:/etc/dnsmasq.d/
    networks:
      - frontend
    cap_add:
      # See https://github.com/pi-hole/docker-pi-hole#note-on-capabilities
      # Required if you are using Pi-hole as your DHCP server, else not needed
      - NET_ADMIN
      # Required if you are using Pi-hole as your NTP client to be able to set the host's system time
      - SYS_TIME
      # Optional, if Pi-hole should get some more processing time
      - SYS_NICE
    restart: unless-stopped
volumes:
  pihole_data:
#  pihole_dnsmasq:
networks:
  frontend:
    external: true